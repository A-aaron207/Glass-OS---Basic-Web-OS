<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass OS</title>
    <style>
        /* --- GLOBAL & ANIMATED BACKGROUND --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { 
            overflow: hidden; height: 100vh; width: 100vw;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #fff; font-size: 14px; position: relative;
        }
        
        /* Animated Background Blobs to make Glassmorphism pop */
        .bg-shape { position: absolute; filter: blur(80px); z-index: -1; opacity: 0.8; animation: float 15s infinite ease-in-out alternate; }
        .shape1 { width: 400px; height: 400px; background: #a18cd1; top: -100px; left: -100px; border-radius: 50%; }
        .shape2 { width: 500px; height: 500px; background: #fbc2eb; bottom: -150px; right: 10%; border-radius: 50%; animation-delay: -5s; }
        .shape3 { width: 300px; height: 300px; background: #8fd3f4; top: 40%; left: 30%; border-radius: 50%; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        /* --- GLASSMORPHISM UTILITY --- */
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }

        /* --- 1. WELCOME SCREEN --- */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            background: inherit; transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .login-card {
            padding: 40px; border-radius: 20px; text-align: center; width: 350px;
        }
        .login-card h1 { margin-bottom: 10px; font-weight: 300; letter-spacing: 2px; }
        .login-card button {
            margin-top: 30px; padding: 12px 30px; font-size: 16px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 30px; background: rgba(255,255,255,0.3); color: white;
            transition: background 0.3s, transform 0.2s;
        }
        .login-card button:hover { background: rgba(255,255,255,0.5); transform: scale(1.05); }

        /* --- 2. TOP BAR --- */
        #top-bar {
            height: 35px; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; position: absolute; top: 0; z-index: 10;
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .top-bar-left { font-weight: bold; letter-spacing: 1px; }
        .top-bar-right { display: flex; gap: 15px; align-items: center; }

        /* --- 3. DESKTOP & DOCK (TASKBAR) --- */
        #desktop { height: 100vh; position: relative; }
        #dock {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 20px; display: flex; gap: 20px; z-index: 10;
        }
        .dock-icon {
            width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center;
            font-size: 28px; cursor: pointer; transition: transform 0.2s, background 0.2s;
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .dock-icon:hover { transform: scale(1.15) translateY(-5px); background: rgba(255,255,255,0.4); }

        /* --- 4. WINDOWS --- */
        .window {
            position: absolute; top: 100px; left: 150px; width: 600px; height: 400px;
            border-radius: 16px; display: none; flex-direction: column; overflow: hidden;
            transition: width 0.3s ease, height 0.3s ease, top 0.3s ease, left 0.3s ease;
        }
        .title-bar {
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); cursor: grab; background: rgba(0,0,0,0.1);
        }
        .title-bar:active { cursor: grabbing; }
        .window-controls { display: flex; gap: 8px; }
        .win-btn { width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer; }
        .close-btn { background: #ff5f56; }
        .min-btn { background: #ffbd2e; } /* Placeholder for minimize */
        .max-btn { background: #27c93f; }
        .window-title { flex-grow: 1; text-align: center; font-weight: 500; font-size: 13px; color: #fff; }
        
        .window-content { flex-grow: 1; position: relative; }
        .window.dragging iframe { pointer-events: none; } /* Prevents mouse sticking inside iframe during drag */

        /* --- 5. APP STYLES --- */
        textarea { 
            width: 100%; height: 100%; resize: none; border: none; padding: 20px; 
            background: transparent; color: white; font-size: 16px; outline: none;
        }
        textarea::placeholder { color: rgba(255,255,255,0.6); }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        /* Calculator App */
        #calc-app { width: 300px; height: 420px; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; height: 100%; }
        .calc-display { grid-column: span 4; background: rgba(0,0,0,0.2); border-radius: 8px; font-size: 32px; text-align: right; padding: 15px; display: flex; align-items: flex-end; justify-content: flex-end; }
        .calc-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; font-size: 20px; color: white; cursor: pointer; transition: 0.2s; }
        .calc-btn:hover { background: rgba(255,255,255,0.4); }
        .calc-btn.op { background: rgba(255, 150, 0, 0.6); }
        .calc-btn.op:hover { background: rgba(255, 150, 0, 0.8); }

    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div id="welcome-screen">
        <div class="login-card glass">
            <h1>Glass OS</h1>
            <p>A crystal clear experience.</p>
            <button onclick="enterOS()">Enter System</button>
        </div>
    </div>

    <div id="top-bar">
        <div class="top-bar-left"> Glass OS</div>
        <div class="top-bar-right">
            <span>📶</span>
            <span>🔋 100%</span>
            <span id="clock">00:00 AM</span>
        </div>
    </div>

    <div id="desktop">
        <div id="dock" class="glass">
            <div class="dock-icon" title="Notes" onclick="openApp('notes-app')">📝</div>
            <div class="dock-icon" title="Browser" onclick="openApp('browser-app')">🌐</div>
            <div class="dock-icon" title="Calculator" onclick="openApp('calc-app')">🧮</div>
        </div>
    </div>

    <div id="notes-app" class="window glass">
        <div class="title-bar" id="notes-app-header">
            <div class="window-controls">
                <button class="win-btn close-btn" onclick="closeApp('notes-app')"></button>
                <button class="win-btn min-btn" onclick="closeApp('notes-app')"></button>
                <button class="win-btn max-btn" onclick="toggleMaximize('notes-app')"></button>
            </div>
            <div class="window-title">Quick Notes</div>
            <div style="width: 50px;"></div> </div>
        <div class="window-content">
            <textarea placeholder="Start typing your glassy notes..."></textarea>
        </div>
    </div>

    <div id="browser-app" class="window glass">
        <div class="title-bar" id="browser-app-header">
            <div class="window-controls">
                <button class="win-btn close-btn" onclick="closeApp('browser-app')"></button>
                <button class="win-btn min-btn" onclick="closeApp('browser-app')"></button>
                <button class="win-btn max-btn" onclick="toggleMaximize('browser-app')"></button>
            </div>
            <div class="window-title">Web Browser</div>
            <div style="width: 50px;"></div>
        </div>
        <div class="window-content">
            <iframe src="https://en.wikipedia.org/wiki/Glassmorphism"></iframe>
        </div>
    </div>

    <div id="calc-app" class="window glass" style="top: 150px; left: 300px;">
        <div class="title-bar" id="calc-app-header">
            <div class="window-controls">
                <button class="win-btn close-btn" onclick="closeApp('calc-app')"></button>
                <button class="win-btn min-btn" onclick="closeApp('calc-app')"></button>
                <button class="win-btn max-btn"></button> </div>
            <div class="window-title">Calculator</div>
            <div style="width: 50px;"></div>
        </div>
        <div class="window-content calc-grid">
            <div class="calc-display" id="calc-display">0</div>
            <button class="calc-btn" onclick="calcInput('7')">7</button>
            <button class="calc-btn" onclick="calcInput('8')">8</button>
            <button class="calc-btn" onclick="calcInput('9')">9</button>
            <button class="calc-btn op" onclick="calcInput('/')">÷</button>
            <button class="calc-btn" onclick="calcInput('4')">4</button>
            <button class="calc-btn" onclick="calcInput('5')">5</button>
            <button class="calc-btn" onclick="calcInput('6')">6</button>
            <button class="calc-btn op" onclick="calcInput('*')">×</button>
            <button class="calc-btn" onclick="calcInput('1')">1</button>
            <button class="calc-btn" onclick="calcInput('2')">2</button>
            <button class="calc-btn" onclick="calcInput('3')">3</button>
            <button class="calc-btn op" onclick="calcInput('-')">-</button>
            <button class="calc-btn" onclick="calcInput('C')">C</button>
            <button class="calc-btn" onclick="calcInput('0')">0</button>
            <button class="calc-btn" onclick="calcInput('=')">=</button>
            <button class="calc-btn op" onclick="calcInput('+')">+</button>
        </div>
    </div>

    <script>
        // --- 1. System Boot ---
        function enterOS() {
            const welcome = document.getElementById('welcome-screen');
            welcome.style.transform = 'scale(1.1)';
            welcome.style.opacity = '0';
            setTimeout(() => { welcome.style.display = 'none'; }, 600);
        }

        // --- 2. Clock ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerText = hours + ':' + minutes + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. Window Management ---
        let highestZIndex = 100;

        function openApp(appId) {
            const app = document.getElementById(appId);
            app.style.display = 'flex';
            bringToFront(app);
        }

        function closeApp(appId) {
            document.getElementById(appId).style.display = 'none';
        }

        function bringToFront(elmnt) {
            highestZIndex++;
            elmnt.style.zIndex = highestZIndex;
        }

        // Maximize / Restore Logic
        function toggleMaximize(appId) {
            const app = document.getElementById(appId);
            if (!app.dataset.maximized || app.dataset.maximized === "false") {
                // Save previous state
                app.dataset.prevTop = app.style.top;
                app.dataset.prevLeft = app.style.left;
                app.dataset.prevWidth = app.style.width || "600px";
                app.dataset.prevHeight = app.style.height || "400px";
                
                // Maximize
                app.style.top = "35px"; // Account for top bar
                app.style.left = "0px";
                app.style.width = "100vw";
                app.style.height = "calc(100vh - 35px)";
                app.dataset.maximized = "true";
            } else {
                // Restore
                app.style.top = app.dataset.prevTop;
                app.style.left = app.dataset.prevLeft;
                app.style.width = app.dataset.prevWidth;
                app.style.height = app.dataset.prevHeight;
                app.dataset.maximized = "false";
            }
        }

        // --- 4. Draggable Logic ---
        document.querySelectorAll('.window').forEach(win => {
            dragElement(win);
        });

        function dragElement(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const header = document.getElementById(elmnt.id + "-header");
            
            elmnt.onmousedown = () => bringToFront(elmnt);

            if (header) {
                header.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                // Don't drag if maximized
                if (elmnt.dataset.maximized === "true") return;
                
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                elmnt.classList.add('dragging'); // Helps prevent iframe glitching
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                elmnt.classList.remove('dragging');
            }
        }

        // --- 5. Calculator Logic ---
        let calcVal = "";
        function calcInput(val) {
            const display = document.getElementById('calc-display');
            if (val === 'C') {
                calcVal = "";
                display.innerText = "0";
            } else if (val === '=') {
                try {
                    // Note: eval is fine for a safe, localized calculator string, but normally avoid it
                    calcVal = eval(calcVal).toString();
                    display.innerText = calcVal;
                } catch {
                    display.innerText = "Error";
                    calcVal = "";
                }
            } else {
                calcVal += val;
                display.innerText = calcVal;
            }
        }
    </script>
</body>
</html>
